<style>
    /* Chat Widget Styles */
    #chat-widget {
        position: fixed;
        bottom: 30px;
        right: 30px;
        z-index: 2000;
        font-family: 'Inter', sans-serif;
    }

    #chat-launcher {
        width: 60px;
        height: 60px;
        border-radius: 50%;
        background: linear-gradient(135deg, var(--accent-green), var(--accent-blue));
        box-shadow: 0 8px 25px rgba(16, 185, 129, 0.4);
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        transition: var(--transition-smooth);
        border: none;
        color: white;
        font-size: 1.5rem;
    }

    #chat-launcher:hover {
        transform: scale(1.1) rotate(5deg);
        box-shadow: 0 12px 35px rgba(16, 185, 129, 0.5);
    }

    #chat-container {
        position: absolute;
        bottom: 80px;
        right: 0;
        width: 380px;
        height: 500px;
        background: var(--secondary-bg);
        border: 1px solid var(--glass-border);
        border-radius: 24px;
        backdrop-filter: var(--glass-blur);
        -webkit-backdrop-filter: var(--glass-blur);
        display: none;
        flex-direction: column;
        overflow: hidden;
        box-shadow: var(--card-shadow);
        animation: fadeInUp 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }

    #chat-header {
        padding: 1.5rem;
        background: rgba(255, 255, 255, 0.05);
        border-bottom: 1px solid var(--glass-border);
        display: flex;
        justify-content: space-between;
        align-items: center;
    }

    #chat-header h3 {
        font-size: 1.1rem;
        font-weight: 700;
        background: linear-gradient(135deg, var(--accent-green), #6ee7b7);
        -webkit-background-clip: text;
        background-clip: text;
        -webkit-text-fill-color: transparent;
    }

    #chat-messages {
        flex: 1;
        overflow-y: auto;
        padding: 1.5rem;
        display: flex;
        flex-direction: column;
        gap: 1rem;
    }

    .message {
        max-width: 85%;
        padding: 0.8rem 1.2rem;
        border-radius: 18px;
        font-size: 0.95rem;
        line-height: 1.4;
        position: relative;
    }

    .message.user {
        align-self: flex-end;
        background: var(--accent-green);
        color: white;
        border-bottom-right-radius: 4px;
    }

    .message.bot {
        align-self: flex-start;
        background: rgba(255, 255, 255, 0.08);
        color: var(--text-main);
        border-bottom-left-radius: 4px;
        border: 1px solid var(--glass-border);
    }

    #chat-input-area {
        padding: 1.2rem;
        border-top: 1px solid var(--glass-border);
        background: rgba(0, 0, 0, 0.1);
        display: flex;
        gap: 0.8rem;
    }

    #chat-input {
        flex: 1;
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid var(--glass-border);
        border-radius: 12px;
        padding: 0.6rem 1rem;
        color: white;
        outline: none;
        transition: var(--transition-smooth);
    }

    #chat-input:focus {
        border-color: var(--accent-green);
        background: rgba(255, 255, 255, 0.1);
    }

    #chat-send {
        background: var(--accent-green);
        color: white;
        border: none;
        width: 40px;
        height: 40px;
        border-radius: 10px;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        transition: var(--transition-smooth);
    }

    #chat-send:hover {
        background: #059669;
        transform: scale(1.05);
    }

    .typing-indicator {
        font-style: italic;
        color: var(--text-dim);
        font-size: 0.85rem;
        margin-top: 0.5rem;
        display: none;
    }

    /* Scrollbar */
    #chat-messages::-webkit-scrollbar {
        width: 6px;
    }

    #chat-messages::-webkit-scrollbar-thumb {
        background: var(--glass-border);
        border-radius: 10px;
    }
</style>

<div id="chat-widget">
    <button id="chat-launcher" onclick="toggleChat()">
        <span id="launcher-icon">💬</span>
    </button>
    <div id="chat-container">
        <div id="chat-header">
            <h3>🌿 PlantScan Assistant</h3>
            <button onclick="toggleChat()"
                style="background:none; border:none; color:var(--text-dim); cursor:pointer; font-size:1.2rem;">&times;</button>
        </div>
        <div id="chat-messages">
            <div class="message bot">
                Hello! I'm your AI plant expert. Ask me anything about plant care, diseases, or identification!
            </div>
        </div>
        <div id="typing-indicator" class="typing-indicator" style="padding: 0 1.5rem 0.5rem;">Assistant is thinking...
        </div>
        <div id="chat-input-area">
            <input type="text" id="chat-input" placeholder="Type your message..." onkeypress="handleKeyPress(event)">
            <button id="chat-send" onclick="sendMessage()">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <line x1="22" y1="2" x2="11" y2="13"></line>
                    <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                </svg>
            </button>
        </div>
    </div>
</div>

<script>
    function toggleChat() {
        const container = document.getElementById('chat-container');
        const icon = document.getElementById('launcher-icon');
        if (container.style.display === 'flex') {
            container.style.display = 'none';
            icon.innerText = '💬';
        } else {
            container.style.display = 'flex';
            icon.innerText = '✕';
            document.getElementById('chat-input').focus();
        }
    }

    function handleKeyPress(event) {
        if (event.key === 'Enter') {
            sendMessage();
        }
    }

    async function sendMessage() {
        const input = document.getElementById('chat-input');
        const messageText = input.value.trim();
        if (!messageText) return;

        // Add user message
        appendMessage('user', messageText);
        input.value = '';

        // Show typing indicator
        const indicator = document.getElementById('typing-indicator');
        indicator.style.display = 'block';

        const messagesDiv = document.getElementById('chat-messages');
        messagesDiv.scrollTop = messagesDiv.scrollHeight;

        try {
            const response = await fetch('{% url "chatbot_response" %}', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-CSRFToken': getCookie('csrftoken')
                },
                body: JSON.stringify({ message: messageText })
            });

            const data = await response.json();
            indicator.style.display = 'none';

            if (data.reply) {
                appendMessage('bot', data.reply);
            } else if (data.error) {
                appendMessage('bot', 'Sorry, I encountered an error: ' + data.error);
            }
        } catch (error) {
            indicator.style.display = 'none';
            appendMessage('bot', 'Connection error. Please try again later.');
            console.error('Chat Error:', error);
        }
    }

    function appendMessage(sender, text) {
        const messagesDiv = document.getElementById('chat-messages');
        const messageEl = document.createElement('div');
        messageEl.className = `message ${sender}`;
        messageEl.innerText = text;
        messagesDiv.appendChild(messageEl);
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }

    function getCookie(name) {
        let cookieValue = null;
        if (document.cookie && document.cookie !== '') {
            const cookies = document.cookie.split(';');
            for (let i = 0; i < cookies.length; i++) {
                const cookie = cookies[i].trim();
                if (cookie.substring(0, name.length + 1) === (name + '=')) {
                    cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                    break;
                }
            }
        }
        return cookieValue;
    }
</script>
