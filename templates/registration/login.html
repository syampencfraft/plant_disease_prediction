{% extends 'base.html' %}

{% block title %}Login - PlantScan{% endblock %}

{% block content %}
<div style="max-width: 400px; margin: 4rem auto;" class="animate-fade-in">
    <div class="card">
        <h2 style="margin-bottom: 2rem; text-align: center; color: var(--accent-green);">Welcome Back</h2>
        <form method="post">
            {% csrf_token %}
            {% for field in form %}
            <div class="form-group">
                <label for="{{ field.id_for_label }}">{{ field.label }}</label>
                <input type="{{ field.field.widget.input_type }}" name="{{ field.html_name }}"
                    id="{{ field.id_for_label }}" class="form-control" placeholder="{{ field.label }}">
                {% if field.errors %}
                <small style="color: #ef4444;">{{ field.errors.0 }}</small>
                {% endif %}
            </div>
            {% endfor %}
            <button type="submit" class="btn btn-primary"
                style="width: 100%; padding: 1rem; margin-top: 1rem;">Login</button>
        </form>
        <p style="margin-top: 1.5rem; text-align: center; color: var(--text-dim);">
            Don't have an account? <a href="{% url 'register' %}"
                style="color: var(--accent-green); text-decoration: none;">Sign Up</a>
        </p>
    </div>
</div>
{% endblock %}
